name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        working-directory: crates/lsp-server
        run: cargo fmt --check

      - name: Clippy
        working-directory: crates/lsp-server
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: crates/lsp-server
        run: cargo test
