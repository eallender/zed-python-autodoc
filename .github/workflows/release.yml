name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            binary: python-autodoc-lsp
          - runner: macos-13
            target: x86_64-apple-darwin
            binary: python-autodoc-lsp
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: python-autodoc-lsp
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: python-autodoc-lsp
            use_cross: true
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: python-autodoc-lsp.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build
        working-directory: crates/lsp-server
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          tar -czf python-autodoc-lsp-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-autodoc-lsp-${{ matrix.target }}
          path: python-autodoc-lsp-${{ matrix.target }}.tar.gz

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: python-autodoc-lsp-*.tar.gz
          generate_release_notes: true
